# Default `docker compose up` brings only Postgres + Flyway — matches the Rider
# workflow where the bot runs on the host with a debugger attached.
# For the end-to-end smoke test (bot inside Docker, ngrok in front, real Telegram):
#   docker compose -f src/coupon-hub-bot/docker-compose.dev.yml --profile smoke up -d --build
# The `bot` service reads its secrets from ./.env.local (gitignored).

services:
  postgres:
    image: postgres:17.10
    container_name: coupon-hub-postgres-dev
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway
    container_name: coupon-hub-flyway-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/coupon_hub_bot
      FLYWAY_USER: admin
      FLYWAY_PASSWORD: admin
    command: migrate -schemas=public
    restart: "no"

  seed-bot-settings:
    image: postgres:17.10
    container_name: coupon-hub-seed-bot-settings-dev
    depends_on:
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./dev-bot-settings.sql:/seed.sql:ro
    environment:
      PGPASSWORD: admin
    command: psql -h postgres -U admin -d coupon_hub_bot -v ON_ERROR_STOP=1 -f /seed.sql
    restart: "no"

  bot:
    profiles: [smoke]
    image: coupon-hub-bot-dev:latest
    container_name: coupon-hub-bot-dev
    build:
      context: ../..
      dockerfile: src/Dockerfile.bot
      args:
        BOT_PROJECT: CouponHubBot
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      seed-bot-settings:
        condition: service_completed_successfully
    env_file:
      - path: ./.env.local
        required: true
    environment:
      # DB lives on the docker network; override whatever .env.local has.
      DATABASE_URL: "Server=postgres;Port=5432;Database=coupon_hub_bot;User Id=coupon_hub_bot_service;Password=coupon_hub_bot_service;Include Error Detail=true;"
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
    ports:
      - "5000:5000"
    restart: unless-stopped

  fake-tg-api:
    profiles: [fake]
    image: coupon-hub-fake-tg-api-test:latest
    container_name: coupon-hub-fake-tg-api-dev
    build:
      context: .
      dockerfile: tests/FakeTgApi/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080

volumes:
  postgres_data:
