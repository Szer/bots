name: "Bot: Deploy"

on:
  workflow_call:
    inputs:
      test-command:
        required: true
        type: string
      migrations-path:
        required: true
        type: string
        description: "Path to migrations dir relative to repo root"
      db-name:
        required: true
        type: string
        description: "Database name for Flyway migrations (e.g. vahter_db)"
      docker-image:
        required: true
        type: string
        description: "Full GHCR image name (e.g. ghcr.io/org/bot)"
      bot-project:
        required: true
        type: string
        description: "BOT_PROJECT build arg (e.g. VahterBanBot)"
      argocd-app-name:
        required: true
        type: string
      container-name:
        required: true
        type: string
      readiness-grace-period:
        type: string
        default: "180"
      sre-enabled:
        type: boolean
        default: true
        description: "Open a deploy-failure issue (wakes the SRE agent) when verify-deploy fails"
    secrets:
      WIREGUARD_CONFIG:
        required: true
      DB_PROD_HOST:
        required: true
      DB_PROD_USERNAME:
        required: true
      DB_PROD_PASSWORD:
        required: true
      ARGOCD_AUTH_TOKEN:
        required: true

env:
  DOCKER_IMAGE: flyway/flyway
  SCHEMAS: public

jobs:
  deploy:
    runs-on: ubuntu-22.04-arm
    # VPN peer is single-occupancy; concurrent connections break DNS (2026-07-23 incident).
    concurrency:
      group: aks-vpn
      cancel-in-progress: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Tests
      run: ${{ inputs.test-command }}

    - name: Upload dotnet test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: "**/*.trx"
      if: ${{ always() }}

    - name: Upload container logs
      uses: actions/upload-artifact@v4
      with:
        name: container-logs
        path: test-artifacts/
      if: ${{ always() }}

    - name: Setup WireGuard VPN
      run: |
        chmod +x scripts/setup-vpn.sh
        ./scripts/setup-vpn.sh
      env:
        WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        SPLIT_TUNNEL: "false"

    - name: Apply migrations to production DB
      run: >-
        docker run --rm
        --network host
        --volume ${{ github.workspace }}/${{ inputs.migrations-path }}:/flyway/sql:ro
        --volume ${{ github.workspace }}/reports:/flyway/reports
        "${{ env.DOCKER_IMAGE }}"
        -url="jdbc:postgresql://${{ secrets.DB_PROD_HOST }}/${{ inputs.db-name }}"
        -user="${{ secrets.DB_PROD_USERNAME }}"
        -password="${{ secrets.DB_PROD_PASSWORD }}"
        migrate -schemas="${{ env.SCHEMAS }}"

    - name: Disconnect VPN
      run: sudo wg-quick down wg0 || true

    - name: Upload Flyway report
      uses: actions/upload-artifact@v4
      with:
        name: Database Report
        path: reports/

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push to GHCR
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ${{ inputs.docker-image }}:${{ github.sha }}, ${{ inputs.docker-image }}:latest
        file: ./src/Dockerfile.bot
        build-args: BOT_PROJECT=${{ inputs.bot-project }}
        platforms: linux/arm64

  verify-deploy:
    needs: deploy
    runs-on: ubuntu-22.04-arm
    # VPN peer is single-occupancy; concurrent connections break DNS (2026-07-23 incident).
    concurrency:
      group: aks-vpn
      cancel-in-progress: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup WireGuard VPN
      run: |
        chmod +x scripts/setup-vpn.sh
        ./scripts/setup-vpn.sh
      env:
        WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}

    - name: Verify deployment
      run: |
        chmod +x scripts/verify-deploy.sh
        ./scripts/verify-deploy.sh
      env:
        ARGOCD_URL: http://argo.internal
        LOKI_URL: http://loki.internal
        PROMETHEUS_URL: http://prometheus.internal:9090
        EXPECTED_IMAGE_TAG: ${{ github.sha }}
        ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        ARGOCD_APP_NAME: ${{ inputs.argocd-app-name }}
        CONTAINER_NAME: ${{ inputs.container-name }}
        READINESS_GRACE_PERIOD: ${{ inputs.readiness-grace-period }}

    - name: Disconnect VPN
      if: always()
      run: sudo wg-quick down wg0 || true

  notify-failure:
    needs: [deploy, verify-deploy]
    if: ${{ failure() && inputs.sre-enabled }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - name: Create deploy-failure issue
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        gh issue create \
          --repo "$GITHUB_REPOSITORY" \
          --title "Deploy failure: ${{ inputs.argocd-app-name }} (${SHORT_SHA})" \
          --label "deploy-failure" \
          --body "## Deploy Failure

        **Bot:** ${{ inputs.argocd-app-name }}
        **ArgoCD app:** ${{ inputs.argocd-app-name }}
        **Container label:** ${{ inputs.container-name }}
        **GHCR image:** ${{ inputs.docker-image }}
        **Commit:** ${{ github.sha }}
        **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        Follow the runbook in \`.github/prompts/sre.md\`. Identify which \`verify-deploy.sh\` phase failed from the run logs above."
