name: "Vahter: Upstream Sync"

# Syncs VahterBanBot source to fsharplang-ru/vahter-bot via pull request.
# The upstream repo is a read-only mirror for community visibility.
# Deploy happens exclusively from this monorepo.

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/BotInfra/**'
      - 'src/VahterBanBot/**'
      - 'src/vahter-bot/**'
      - 'src/Dockerfile.bot'
      - 'tests/VahterBanBot.Tests/**'
      - 'tests/BotTestInfra/**'
      - 'tests/FakeTgApi/**'
      - 'tests/FakeAzureOcrApi/**'
      - 'tests/Dockerfile.fake'
      - 'tests/Directory.Build.targets'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/_bot-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout monorepo
      uses: actions/checkout@v4
      with:
        path: monorepo

    - name: Checkout upstream
      uses: actions/checkout@v4
      with:
        repository: fsharplang-ru/vahter-bot
        token: ${{ secrets.VAHTER_UPSTREAM_TOKEN }}
        path: upstream

    - name: Replace upstream content
      run: |
        set -euo pipefail
        cd upstream

        # Remove everything except .git
        find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
        mkdir -p src tests .github/workflows

        # ── Source code ──
        cp -r ../monorepo/src/BotInfra src/BotInfra
        cp -r ../monorepo/src/VahterBanBot src/VahterBanBot
        cp -r ../monorepo/src/vahter-bot src/vahter-bot
        cp ../monorepo/src/Dockerfile.bot src/

        # ── Tests ──
        cp -r ../monorepo/tests/BotTestInfra tests/BotTestInfra
        cp -r ../monorepo/tests/VahterBanBot.Tests tests/VahterBanBot.Tests
        cp -r ../monorepo/tests/FakeTgApi tests/FakeTgApi
        cp -r ../monorepo/tests/FakeAzureOcrApi tests/FakeAzureOcrApi
        cp ../monorepo/tests/Dockerfile.fake tests/
        cp ../monorepo/tests/Directory.Build.targets tests/

        # ── Build infrastructure ──
        cp ../monorepo/Directory.Build.props .
        cp ../monorepo/Directory.Packages.props .
        cp ../monorepo/global.json .
        cp ../monorepo/.gitignore .

        # ── CI (build only — deploy lives in the monorepo) ──
        mkdir -p .github/workflows
        cp ../monorepo/.github/workflows/_bot-build.yml .github/workflows/

        cat > .github/workflows/build.yml << 'EOF'
        name: Build

        on:
          pull_request:
            branches: [ "main" ]
          push:
            branches: [ "main" ]
          workflow_dispatch:

        jobs:
          build:
            uses: ./.github/workflows/_bot-build.yml
            with:
              test-command: >-
                dotnet test tests/VahterBanBot.Tests/VahterBanBot.Tests.fsproj
                -c Release --logger "trx;LogFileName=test-results.trx"
                --logger "console;verbosity=detailed"
        EOF
        sed -i 's/^        //' .github/workflows/build.yml

        # ── Solution file ──
        dotnet new sln --name vahter-ban-bot --force
        SLN=$(ls vahter-ban-bot.sln* 2>/dev/null | head -1)
        dotnet sln "$SLN" add \
          src/BotInfra/BotInfra.fsproj \
          src/VahterBanBot/VahterBanBot.fsproj \
          tests/BotTestInfra/BotTestInfra.fsproj \
          tests/VahterBanBot.Tests/VahterBanBot.Tests.fsproj \
          tests/FakeTgApi/FakeTgApi.fsproj \
          tests/FakeAzureOcrApi/FakeAzureOcrApi.fsproj

    - name: Create pull request
      run: |
        cd upstream
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A

        if git diff --cached --quiet; then
          echo "No changes to sync"
          exit 0
        fi

        BRANCH="sync/monorepo-${GITHUB_SHA:0:7}"
        git checkout -b "$BRANCH"
        git commit -m "Sync from monorepo (${GITHUB_SHA:0:7})"
        git push origin "$BRANCH"

        NEW_PR_URL=$(gh pr create \
          --repo fsharplang-ru/vahter-bot \
          --base main \
          --head "$BRANCH" \
          --title "Sync from monorepo (${GITHUB_SHA:0:7})" \
          --body "Automated sync from monorepo commit ${GITHUB_SHA}.")
        echo "Created: $NEW_PR_URL"

        # Close previous sync PRs (keep only the new one)
        gh pr list \
          --repo fsharplang-ru/vahter-bot \
          --state open \
          --head "sync/" \
          --json number,headRefName \
          --jq ".[] | select(.headRefName != \"$BRANCH\") | .number" \
        | while read -r old_pr; do
            echo "Closing old sync PR #${old_pr}"
            gh pr close "$old_pr" \
              --repo fsharplang-ru/vahter-bot \
              --delete-branch \
              --comment "Superseded by ${NEW_PR_URL}"
          done
      env:
        GH_TOKEN: ${{ secrets.VAHTER_UPSTREAM_TOKEN }}
